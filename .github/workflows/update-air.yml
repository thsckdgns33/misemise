name: 에어코리아 데이터 갱신

on:
  schedule:
    - cron: '15 * * * *'   # 매시 15분 (에어코리아는 정시 직후 갱신)
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: update-air
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 에어코리아 데이터 수집
        env:
          AIRKOREA_KEY: ${{ secrets.AIRKOREA_KEY }}
        run: node scripts/fetch-air.js

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: 에어코리아 데이터 갱신"
            git push
          fi
